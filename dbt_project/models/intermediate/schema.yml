version: 2

models:
  - name: int_jobs_enriched
    description: "Enriched job postings with cleaned text, parsed location, and average salary"
    columns:
      - name: job_key
        description: "Unique surrogate key"
        tests:
          - unique
          - not_null

      - name: job_id
        description: "Original job identifier from the API"
        tests:
          - unique
          - not_null

      - name: job_title
        description: "Trimmed job title"
        tests:
          - not_null

      - name: company_name
        description: "Trimmed company display name"
        tests:
          - not_null

      - name: category
        description: "Job category label from the API"

      - name: contract_type
        description: "Employment contract type"

      - name: city
        description: "City parsed from location_name (text before the first comma)"

      - name: region
        description: "Region parsed from location_name (text after the first comma)"

      - name: latitude
        description: "Job location latitude"

      - name: longitude
        description: "Job location longitude"

      - name: salary_min
        description: "Minimum advertised salary"

      - name: salary_max
        description: "Maximum advertised salary"

      - name: salary_avg
        description: "Average of salary_min and salary_max when both are present"

      - name: is_salary_predicted
        description: "Whether the salary was predicted by the source API"

      - name: date_posted
        description: "Date the job was posted"
        tests:
          - not_null

      - name: job_url
        description: "Redirect URL to the job posting"

      - name: description
        description: "Full job description text"

      - name: source_file
        description: "Source file name from the raw ingestion layer"
